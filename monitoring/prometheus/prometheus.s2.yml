global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    server: s2

scrape_configs:
  - job_name: "webhook-api"
    static_configs:
      - targets: ["webhook-api:8443"]
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s
