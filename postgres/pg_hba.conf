# PostgreSQL Client Authentication Configuration
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local connections
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker internal network (webhook-net)
host    all             all             172.0.0.0/8             scram-sha-256

# Replication — allow S2 (192.168.255.10) to connect as replicator
host    replication     replicator      192.168.255.10/32       scram-sha-256

# Allow all app connections from internal network
host    all             all             192.168.255.0/24        scram-sha-256
